<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How to escape the matrix</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ff66;
      font-size: clamp(2.5rem, 7vw, 6rem);
      font-weight: 800;
      text-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66, 0 0 40px #00ff66;
      letter-spacing: 2px;
      animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        text-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66, 0 0 40px #00ff66;
      }
      50% {
        transform: scale(1.03);
        text-shadow: 0 0 15px #00ff66, 0 0 30px #00ff66, 0 0 60px #00ff66;
      }
    }

    .buttons {
      margin-top: 35px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      padding: 16px 34px;
      background: transparent;
      color: #00ff66;
      border: 2px solid #00ff66;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.35);
      transition: 0.25s ease;
    }

    .btn:hover {
      background: #00ff66;
      color: #000;
      box-shadow: 0 0 25px rgba(0, 255, 102, 0.8);
      transform: translateY(-2px);
    }

    .subtitle {
      margin-top: 14px;
      color: rgba(0, 255, 102, 0.75);
      font-size: 0.95rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="overlay">
    <h1>How to escape the matrix</h1>

    <div class="buttons">
      <a class="btn" href="https://forms.gle/oTw7VfSAeQa1fkND7" target="_blank" rel="noopener noreferrer">
        Course 1
      </a>

      <a class="btn" href="https://forms.gle/FvDtjGLJCbXLqWkG9" target="_blank" rel="noopener noreferrer">
        Course 2
      </a>
    </div>

    <div class="subtitle">Choose your exit route...</div>
  </div>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();

    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%".split("");
    const fontSize = 18;
    let columns = Math.floor(canvas.width / fontSize);
    let drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#00ff66";
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener("resize", () => {
      resizeCanvas();
      columns = Math.floor(canvas.width / fontSize);
      drops = Array(columns).fill(1);
    });
  </script>
</body>
</html>
