<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How to escape the matrix</title>

<style>
:root{
  --accent:#00ff66;
  --bg:#000;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
}

/* MATRIX CANVAS */
canvas{
  position:fixed;
  top:0;left:0;
  z-index:0;
}

/* MAIN CONTENT */
.overlay{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

h1{
  color:var(--accent);
  font-size:clamp(3rem,7vw,6rem);
  text-shadow:0 0 20px var(--accent);
  animation:pulse 2.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

.buttons{
  margin-top:30px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:16px 32px;
  background:var(--accent);
  color:#000;
  border:none;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 0 20px rgba(0,255,102,0.6);
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

/* MENU BUTTON */
.menu-btn{
  position:fixed;
  top:20px;
  left:20px;
  z-index:3;
  background:var(--accent);
  color:#000;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-size:20px;
  cursor:pointer;
}

/* SIDE MENU */
.sidebar{
  position:fixed;
  top:0;
  left:-300px;
  width:300px;
  height:100%;
  background:#050a07;
  border-right:2px solid var(--accent);
  padding:20px;
  transition:.3s;
  z-index:4;
  overflow-y:auto;
}

.sidebar.active{
  left:0;
}

.sidebar h2{
  color:var(--accent);
  margin-bottom:15px;
}

.side-btn{
  display:block;
  width:100%;
  margin-bottom:10px;
  padding:12px;
  background:#0f1e15;
  color:var(--accent);
  border:1px solid var(--accent);
  border-radius:10px;
  cursor:pointer;
}

/* MATRIX */
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
  <h2>Controls</h2>

  <button class="side-btn" onclick="toggleRain()">Toggle Rain</button>
  <button class="side-btn" onclick="faster()">Faster</button>
  <button class="side-btn" onclick="slower()">Slower</button>
  <button class="side-btn" onclick="glitch()">Glitch</button>
  <button class="side-btn" onclick="changeColor()">Change Color</button>
  <button class="side-btn" onclick="randomTitle()">Random Title</button>
  <button class="side-btn" onclick="copyLink(1)">Copy Course 1</button>
  <button class="side-btn" onclick="copyLink(2)">Copy Course 2</button>
  <button class="side-btn" onclick="resetAll()">Reset</button>
</div>

<div class="overlay">
  <h1 id="title">How to escape the matrix</h1>

  <div class="buttons">
    <a class="btn" href="https://forms.gle/oTw7VfSAeQa1fkND7" target="_blank">Course 1</a>
    <a class="btn" href="https://forms.gle/FvDtjGLJCbXLqWkG9" target="_blank">Course 2</a>
  </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split("");
let fontSize = 18;
let columns = canvas.width/fontSize;
let drops = Array(Math.floor(columns)).fill(1);

let speed = 35;
let running = true;
let color = "#00ff66";

function draw(){
  if(!running) return;

  ctx.fillStyle="rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle=color;
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  }
}

setInterval(draw,speed);

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

/* FUNCTIONS */
function toggleRain(){
  running=!running;
}

function faster(){
  speed=Math.max(10,speed-5);
}

function slower(){
  speed+=5;
}

function glitch(){
  document.body.style.filter="hue-rotate("+(Math.random()*360)+"deg)";
}

function changeColor(){
  const colors=["#00ff66","#00d4ff","#ff00ff","#ffff00"];
  color=colors[Math.floor(Math.random()*colors.length)];
  document.documentElement.style.setProperty('--accent',color);
}

function randomTitle(){
  const titles=[
    "Escape protocol",
    "Break the system",
    "Wake up",
    "You are not free",
    "Exit the illusion"
  ];
  document.getElementById("title").innerText=
    titles[Math.floor(Math.random()*titles.length)];
}

function copyLink(n){
  const links=[
    "https://forms.gle/oTw7VfSAeQa1fkND7",
    "https://forms.gle/FvDtjGLJCbXLqWkG9"
  ];
  navigator.clipboard.writeText(links[n-1]);
}

function resetAll(){
  location.reload();
}
</script>

</body>
</html>
